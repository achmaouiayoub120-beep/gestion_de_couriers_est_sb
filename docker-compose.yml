version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: estsb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: estsb
      POSTGRES_PASSWORD: estsb_password
      POSTGRES_DB: estsb_mail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estsb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: estsb_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://estsb:estsb_password@postgres:5432/estsb_mail
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
